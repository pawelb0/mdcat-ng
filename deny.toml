[graph]
targets = [
  { triple = 'x86_64-unknown-linux-gnu' },
  { triple = 'x86_64-apple-darwin' },
  { triple = 'x86_64-pc-windows-msvc' },
]

[advisories]
version = 2
ignore = [
    # dtolnay archived the `paste` repo (RUSTSEC-2024-0436). Pulled
    # in transitively through icy_sixel / quantette; no action on our
    # side until upstream migrates.
    "RUSTSEC-2024-0436",
    # bincode 1.x development ceased (RUSTSEC-2025-0141). Pulled in
    # through syntect's build-time dump loader; safe alternative only
    # lands once syntect publishes against bincode 2 / postcard.
    "RUSTSEC-2025-0141",
]

[licenses]
version = 2
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "MPL-2.0",
    "ISC",
    "Zlib",
    "Unicode-3.0",
]
